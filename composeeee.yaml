services:
  wordpress:
    image: wordpress:latest
    restart: always
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: josh
      WORDPRESS_DB_PASSWORD: josh
      WORDPRESS_DB_NAME: blogdb
    volumes:
      - wordpress:/var/www/html
    depends_on:
      - db
    networks:
      - wordpress-network

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: blogdb
      MYSQL_USER: josh
      MYSQL_PASSWORD: josh
      MYSQL_ROOT_PASSWORD: josh1234  # Changed from RANDOM for reliability
    volumes:
      - db:/var/lib/mysql
    networks:
      - wordpress-network
    command: 
      - --default-authentication-plugin=mysql_native_password  # Fixes MySQL 8.0 auth issue

networks:
  wordpress-network:
    driver: bridge

volumes:
  wordpress:
  db:
